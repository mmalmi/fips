[profile.ci]
junit = { path = "junit.xml" }

[test-groups]
node-synthetic = { max-threads = 1 }

# nextest runs each test in a separate process, so in-process Tokio mutexes
# cannot serialize the synthetic localhost UDP node tests on CI. Those tests
# intentionally send one-shot handshakes without production reconnect timers;
# keep them mutually exclusive so routed-data assertions fail only for protocol
# regressions, not runner-local UDP pressure from another topology test.
[[profile.default.overrides]]
filter = 'test(node::tests::)'
test-group = 'node-synthetic'

[[profile.ci.overrides]]
filter = 'test(node::tests::)'
test-group = 'node-synthetic'
