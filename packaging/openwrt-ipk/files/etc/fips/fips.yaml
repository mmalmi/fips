# FIPS Node Configuration
#
# Edit this file before starting the FIPS daemon.
# Full reference: https://github.com/jmcorgan/fips/blob/master/docs/design/fips-configuration.md
#
# After editing, restart the daemon:
#   /etc/init.d/fips restart

node:
  identity:
    # A persistent keypair is generated on first start and saved to
    # /etc/fips/fips.key (private) and /etc/fips/fips.pub (public).
    # The router keeps the same FIPS identity across reboots.
    #
    # To use an explicit key instead, comment out 'persistent' and set:
    #   nsec: "your-64-char-hex-private-key"
    persistent: true
  discovery:
    # Optional Nostr-mediated overlay endpoint discovery.
    # nostr:
    #   enabled: true
    #   policy: configured_only  # disabled | configured_only | open
    #   open_discovery_max_pending: 64 # caps queued open-discovery retries
    #   app: "fips-overlay-v1"
    #   advertise: true
    #   advert_relays:
    #     - "wss://relay.damus.io"
    #     - "wss://nos.lol"
    #     - "wss://offchain.pub"
    #   # Optional override. If omitted, FIPS uses the built-in STUN list.
    #   # Built-in relay/STUN defaults are best-effort and should be
    #   # overridden by operators for production use.
    #   stun_servers:
    #     - "stun:stun.l.google.com:19302"
    #     - "stun:stun.cloudflare.com:3478"
    #     - "stun:global.stun.twilio.com:3478"

tun:
  enabled: true
  name: fips0
  mtu: 1280

dns:
  enabled: true
  # bind_addr defaults to "::1" (IPv6 loopback). On OpenWrt, dnsmasq
  # owns port 53; fips-dns-setup adds a forwarder rule pointing at
  # 127.0.0.1#5354. Loopback bind is sufficient for that path.
  #
  # Set "::" to expose the responder to LAN clients directly (rare -
  # most installs let dnsmasq forward instead). The mesh-interface
  # filter in src/upper/dns.rs defends /etc/fips/hosts aliases from
  # cross-mesh enumeration when bound to a wildcard.
  # bind_addr: "::1"
  port: 5354

transports:
  # Low-priority encrypted datagrams over the Nostr relays configured above.
  # The standalone daemon owns the relay bridge; fips-core owns no relay URLs.
  # nostr_relay: {}

  udp:
    bind_addr: "0.0.0.0:2121"
    # advertise_on_nostr: true
    # public: false # false => advertise udp:nat; true => advertise bound host:port
    # accept_connections: true # default; refuse inbound msg1 when false
    # outbound_only: false     # true => bind ephemeral, no listener on a
    #                          # known port. Forces advertise_on_nostr=false
    #                          # and accept_connections=false. Pure-client
    #                          # posture; bind_addr is ignored.

  tcp:
    # Accepts inbound connections. No static outbound peers.
    bind_addr: "0.0.0.0:8443"
    # advertise_on_nostr: true

  # Ethernet transport - physical port names, NOT bridge names.
  # Run 'ip link show' on the router to identify port names.
  ethernet:
    wan:
      interface: "eth0"
      discovery: true
      announce: true
      auto_connect: true
      accept_connections: true
    wwan:
      interface: "phy0-sta0"
      discovery: true
      announce: true
      auto_connect: true
      accept_connections: true
    lan:
      interface: "br-lan"
      discovery: true
      announce: true
      auto_connect: true
      accept_connections: true

# Outbound LAN gateway. dnsmasq forwards .fips queries to listen=[::1]:5353
# (configured by the fips init script). Requires IPv6 forwarding enabled.
gateway:
  enabled: true
  pool: "fd01::/112"
  lan_interface: "br-lan"
  dns:
    upstream: "[::1]:5354"      # FIPS daemon DNS resolver (matches daemon default)
    ttl: 60                     # DNS TTL and mapping lifetime (seconds)
  pool_grace_period: 60         # seconds after last session before reclaiming

peers: []
  # Static peers for bootstrapping (UDP or TCP):
  # - npub: "npub1..."
  #   alias: "test-us01"
  #   addresses:
  #     - transport: udp
  #       addr: "test-us01.fips.network:2121"
  #     - transport: udp
  #       addr: "nat"  # Use node.discovery.nostr for Nostr/STUN hole punching
  #   connect_policy: auto_connect
